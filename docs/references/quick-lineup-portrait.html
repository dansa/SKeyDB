<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=390, initial-scale=1" />
<title>Quick Lineup — Portrait Reference (390 × 844)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { margin: 0; padding: 0; background: #08111c; color: #e2e8f0; font-family: system-ui, sans-serif; }
  body { width: 390px; height: 844px; overflow: hidden; display: flex; flex-direction: column; }

  .portrait-filled-1 { background: linear-gradient(180deg, #4a2c6e 0%, #1e1b4b 60%, #0f172a 100%); }
  .portrait-filled-2 { background: linear-gradient(180deg, #2c4a6e 0%, #1b2e4b 60%, #0f172a 100%); }
  .portrait-filled-3 { background: linear-gradient(180deg, #6e2c2c 0%, #4b1b1b 60%, #0f172a 100%); }
  .gear-filled { background: linear-gradient(135deg, #1e293b 0%, #475569 100%); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     HEADER BAR — step counter, context label, cancel/finish
     ~32px tall
     ═══════════════════════════════════════════════════════ -->
<div class="shrink-0 flex items-center justify-between border-b border-slate-500/45 bg-slate-950/80 px-3 py-1.5">
  <div class="flex items-center gap-2">
    <span class="text-[10px] font-bold tracking-wider text-amber-400 uppercase">Step 3 / 17</span>
    <span class="text-[10px] text-slate-400">Lotan → Wheel 2</span>
  </div>
  <div class="flex items-center gap-2">
    <button class="border border-slate-500/45 bg-slate-950/55 px-2.5 py-1 text-[10px] tracking-wider text-slate-300 uppercase">Cancel</button>
    <button class="border border-emerald-400/50 bg-emerald-500/10 px-2.5 py-1 text-[10px] tracking-wider text-emerald-200 uppercase">Done</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SLOT CARDS — 4 integrated cards in a horizontal row
     ~25-30% of viewport height (~195-210px)
     Each card: portrait art top ~40%, gear bottom ~60%
     Active slot (Slot 1) gets amber border
     Active gear target (W2) gets amber border within card
     Tapping portrait → jump to awakener step
     Tapping gear tile → jump to that wheel/covenant step
     ═══════════════════════════════════════════════════════ -->
<div class="shrink-0 border-b border-slate-500/45 bg-slate-900/30 px-2 py-2">
  <!-- height: ~25% of 844 = ~210px for the card area -->
  <div class="grid grid-cols-4 gap-1.5" style="height: 210px;">

    <!-- SLOT 1: Lotan, filled, ACTIVE SLOT (amber border on card) -->
    <!-- Gear zone: Cov (1:1) top-left, W1+W2 (1:2 tall) side-by-side below -->
    <div class="flex flex-col overflow-hidden border-2 border-amber-500/60">
      <!-- Portrait zone ~40% (clickable → jump to awakener step) -->
      <button class="relative shrink-0 overflow-hidden" style="height: 40%;" type="button">
        <div class="portrait-filled-1 h-full w-full"></div>
        <div class="absolute inset-x-0 top-0 px-1 pt-0.5" style="background: linear-gradient(180deg, rgba(8,15,28,0.8) 0%, transparent 100%);">
          <span class="text-[8px] font-bold text-slate-100" style="text-shadow: 0 1px 2px rgba(0,0,0,0.9);">Lotan</span>
        </div>
      </button>
      <!-- Gear zone ~60%: Cov square top-left, two tall wheels below -->
      <div class="flex min-h-0 flex-1 flex-col gap-[2px] bg-slate-950/60 p-[2px]">
        <!-- Row 1: Covenant (1:1 square, compact) -->
        <button class="relative shrink-0 overflow-hidden border border-slate-300/30" style="width: 45%; aspect-ratio: 1;" type="button">
          <div class="gear-filled h-full w-full"></div>
          <span class="absolute bottom-0 right-0 bg-slate-900/80 px-0.5 text-[5px] text-slate-400">Cov</span>
        </button>
        <!-- Row 2: W1 + W2 side by side (1:2 tall rectangles) -->
        <div class="flex min-h-0 flex-1 gap-[2px]">
          <!-- Wheel 1: FILLED -->
          <button class="relative min-h-0 flex-1 overflow-hidden border border-slate-300/30" type="button">
            <div class="gear-filled h-full w-full"></div>
            <span class="absolute bottom-0 right-0 bg-slate-900/80 px-0.5 text-[5px] text-slate-400">W1</span>
          </button>
          <!-- Wheel 2: ACTIVE TARGET (amber border) — empty -->
          <button class="relative min-h-0 flex-1 overflow-hidden border-2 border-amber-400/70" type="button">
            <div class="flex h-full w-full items-center justify-center border border-dashed border-slate-600 bg-slate-900/60">
              <span class="text-[7px] text-amber-400">+</span>
            </div>
            <span class="absolute bottom-0 right-0 bg-amber-900/60 px-0.5 text-[5px] font-bold text-amber-300">W2</span>
          </button>
        </div>
      </div>
    </div>

    <!-- SLOT 2: Gaia, fully geared, NOT active -->
    <div class="flex flex-col overflow-hidden border border-slate-500/40">
      <button class="relative shrink-0 overflow-hidden" style="height: 40%;" type="button">
        <div class="portrait-filled-2 h-full w-full"></div>
        <div class="absolute inset-x-0 top-0 px-1 pt-0.5" style="background: linear-gradient(180deg, rgba(8,15,28,0.8) 0%, transparent 100%);">
          <span class="text-[8px] font-bold text-slate-100" style="text-shadow: 0 1px 2px rgba(0,0,0,0.9);">Gaia</span>
        </div>
      </button>
      <div class="flex min-h-0 flex-1 flex-col gap-[2px] bg-slate-950/60 p-[2px]">
        <button class="relative shrink-0 overflow-hidden border border-slate-300/30" style="width: 45%; aspect-ratio: 1;" type="button">
          <div class="gear-filled h-full w-full"></div>
          <span class="absolute bottom-0 right-0 bg-slate-900/80 px-0.5 text-[5px] text-slate-400">Cov</span>
        </button>
        <div class="flex min-h-0 flex-1 gap-[2px]">
          <button class="relative min-h-0 flex-1 overflow-hidden border border-slate-300/30" type="button">
            <div class="gear-filled h-full w-full"></div>
            <span class="absolute bottom-0 right-0 bg-slate-900/80 px-0.5 text-[5px] text-slate-400">W1</span>
          </button>
          <button class="relative min-h-0 flex-1 overflow-hidden border border-slate-300/30" type="button">
            <div class="gear-filled h-full w-full"></div>
            <span class="absolute bottom-0 right-0 bg-slate-900/80 px-0.5 text-[5px] text-slate-400">W2</span>
          </button>
        </div>
      </div>
    </div>

    <!-- SLOT 3: Rina, has awakener but no gear, NOT active -->
    <div class="flex flex-col overflow-hidden border border-slate-500/40">
      <button class="relative shrink-0 overflow-hidden" style="height: 40%;" type="button">
        <div class="portrait-filled-3 h-full w-full"></div>
        <div class="absolute inset-x-0 top-0 px-1 pt-0.5" style="background: linear-gradient(180deg, rgba(8,15,28,0.8) 0%, transparent 100%);">
          <span class="text-[8px] font-bold text-slate-100" style="text-shadow: 0 1px 2px rgba(0,0,0,0.9);">Rina</span>
        </div>
      </button>
      <div class="flex min-h-0 flex-1 flex-col gap-[2px] bg-slate-950/60 p-[2px]">
        <button class="relative shrink-0 overflow-hidden border border-slate-600/40" style="width: 45%; aspect-ratio: 1;" type="button">
          <div class="flex h-full w-full items-center justify-center border border-dashed border-slate-700/60 bg-slate-900/60">
            <span class="text-[7px] text-slate-600">+</span>
          </div>
        </button>
        <div class="flex min-h-0 flex-1 gap-[2px]">
          <button class="relative min-h-0 flex-1 overflow-hidden border border-slate-600/40" type="button">
            <div class="flex h-full w-full items-center justify-center border border-dashed border-slate-700/60 bg-slate-900/60">
              <span class="text-[7px] text-slate-600">+</span>
            </div>
          </button>
          <button class="relative min-h-0 flex-1 overflow-hidden border border-slate-600/40" type="button">
            <div class="flex h-full w-full items-center justify-center border border-dashed border-slate-700/60 bg-slate-900/60">
              <span class="text-[7px] text-slate-600">+</span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- SLOT 4: Empty -->
    <div class="flex flex-col overflow-hidden border border-dashed border-slate-600/50">
      <button class="relative flex shrink-0 items-center justify-center overflow-hidden bg-slate-900/40" style="height: 40%;" type="button">
        <div class="flex h-8 w-8 rotate-45 items-center justify-center border border-dashed border-slate-600/60">
          <span class="-rotate-45 text-sm text-slate-600">+</span>
        </div>
      </button>
      <div class="flex min-h-0 flex-1 flex-col gap-[2px] bg-slate-950/40 p-[2px]">
        <div class="shrink-0 border border-dashed border-slate-700/30 bg-slate-900/30" style="width: 45%; aspect-ratio: 1;"></div>
        <div class="flex min-h-0 flex-1 gap-[2px]">
          <div class="min-h-0 flex-1 border border-dashed border-slate-700/30 bg-slate-900/30"></div>
          <div class="min-h-0 flex-1 border border-dashed border-slate-700/30 bg-slate-900/30"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     PICKER — BuilderPickerPanel with hideTabs=true
     No visible tabs — picker auto-shows the right category
     based on the current step (wheels tab in this example)
     This fills all remaining vertical space (flex-1)
     ═══════════════════════════════════════════════════════ -->
<div class="flex min-h-0 flex-1 flex-col bg-slate-950/85">
  <!-- Sorting toggles (collapsible accordion) -->
  <div class="shrink-0 px-2 pt-1.5">
    <button class="w-full flex items-center justify-between border border-slate-500/45 bg-slate-900/55 px-2 py-1.5 text-[10px] tracking-wider text-slate-300 uppercase">
      <span>Sorting &amp; Toggles</span>
      <span class="text-slate-500">›</span>
    </button>
  </div>

  <!-- Search -->
  <div class="shrink-0 px-2 pt-1.5">
    <input
      class="w-full border border-slate-500/45 bg-slate-900/70 px-2.5 py-1.5 text-xs text-slate-100 placeholder:text-slate-500"
      placeholder="Search wheels..."
      type="search"
    />
  </div>

  <!-- Rarity filters -->
  <div class="shrink-0 space-y-1.5 px-2 pt-1.5">
    <div class="grid grid-cols-4 gap-1">
      <button class="border border-amber-200/60 bg-slate-800/80 py-1 text-[10px] text-amber-100">All</button>
      <button class="border border-slate-500/45 bg-slate-900/55 py-1 text-[10px] text-slate-300">SSR</button>
      <button class="border border-slate-500/45 bg-slate-900/55 py-1 text-[10px] text-slate-300">SR</button>
      <button class="border border-slate-500/45 bg-slate-900/55 py-1 text-[10px] text-slate-300">R</button>
    </div>
    <!-- Mainstat filters -->
    <div class="grid grid-cols-9 gap-1">
      <button class="flex h-7 items-center justify-center border border-amber-200/60 bg-slate-800/80 text-[10px] text-amber-100">All</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">CR</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">CD</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">RM</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">DA</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">AR</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">KR</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">SY</button>
      <button class="flex h-7 items-center justify-center border border-slate-500/45 bg-slate-900/55 text-[10px] text-slate-300">DR</button>
    </div>
  </div>

  <!-- Scrollable picker grid -->
  <div class="mt-1.5 min-h-0 flex-1 overflow-y-auto px-2 pb-2">
    <div class="grid grid-cols-4 gap-2">
      <div class="flex flex-col">
        <div class="aspect-square border border-slate-500/40 bg-slate-800/40 flex items-center justify-center text-slate-600 text-[10px]">×</div>
        <span class="mt-0.5 text-[9px] text-slate-400 truncate text-center">Not Set</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Grace Through…</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-amber-300/40"></div>
        <span class="mt-0.5 text-[9px] text-amber-200 truncate text-center">Celestial Beast</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Rewinding Time</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Deathless Ascent</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Manikin of Ob…</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Heart of Knight</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Hour of Fortune</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Aberrant Devour</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Memory Spiral</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Gift of Decay</span>
      </div>
      <div class="flex flex-col">
        <div class="aspect-square gear-filled border border-slate-300/35"></div>
        <span class="mt-0.5 text-[9px] text-slate-300 truncate text-center">Drifting in Des…</span>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     FOOTER BAR — back / skip navigation + compact counter
     ~32px tall
     ═══════════════════════════════════════════════════════ -->
<div class="shrink-0 flex items-center justify-between border-t border-slate-500/45 bg-slate-950/80 px-3 py-1.5">
  <button class="border border-slate-500/45 bg-slate-950/55 px-3 py-1 text-[10px] tracking-wider text-slate-300 uppercase">← Back</button>
  <span class="text-[10px] text-slate-500">3 / 17</span>
  <button class="border border-amber-500/50 bg-amber-500/10 px-3 py-1 text-[10px] tracking-wider text-amber-300 uppercase">Skip →</button>
</div>

</body>
</html>
